name: CI/CD PPDB Makassar

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: self-hosted # Gunakan runner yang sudah kamu setup di server

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: user_ppdb
          POSTGRES_PASSWORD: password_ppdb
          POSTGRES_DB: ppdb_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # Bagian ini untuk build Docker Image (Langkah awal ke K8s)
    - name: Build Docker Image
      run: |
        docker build -t spmb-api:latest .